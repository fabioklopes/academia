{% extends "academia/base.html" %}
{% block title %}Reset de Senha{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h3 class="card-title text-center">Senha Redefinida</h3>
            <p>Sua senha foi redefinida com sucesso. Agora você pode fazer o login com sua nova senha.</p>
            <div class="text-center">
              <a href="{% url 'login' %}" class="btn btn-primary">Fazer Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
