{% extends 'academia/base.html' %}

{% block title %}Editar Perfil - Academia de Jiu-Jitsu{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4>Editar Perfil</h4>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="first_name" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="last_name" class="form-label">Sobrenome</label>
                        <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="birthday" class="form-label">Data de Nascimento</label>
                        <input type="date" class="form-control" id="birthday" name="birthday" value="{{ user.birthday|date:'Y-m-d' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="photo" class="form-label">Foto</label>
                        <input type="file" class="form-control" id="photo" name="photo" accept="image/*" capture="camera">
                        <small class="form-text text-muted">Você pode selecionar uma foto do dispositivo ou usar a câmera.</small>
                        {% if user.photo %}
                            <div class="mt-2">
                                <img src="{{ user.photo.url }}" alt="Foto atual" width="100" class="rounded">
                            </div>
                        {% endif %}
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                        <a href="{% url 'perfil' %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
