{% extends "academia/base.html" %}
{% block title %}Reset de Senha{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h3 class="card-title text-center">Redefinir Senha</h3>
            <p>Por favor, insira seu endereço de e-mail para receber um link de redefinição de senha.</p>
            <form method="post">
              {% csrf_token %}
              {{ form.as_p }}
              <button type="submit" class="btn btn-primary w-100">Enviar Link</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
