{% extends "academia/base.html" %}
{% block title %}Reset de Senha{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h3 class="card-title text-center">Link Enviado</h3>
            <p>Um e-mail foi enviado para você com as instruções para redefinir sua senha. Se não o receber em alguns minutos, verifique sua pasta de spam.</p>
            <div class="text-center">
              <a href="{% url 'login' %}" class="btn btn-primary">Voltar para o Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
